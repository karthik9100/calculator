name: Calculator CI

on:
  push:
    branches:
      - master

jobs:

  test:

    runs-on: self-hosted

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - run: pytest

      - run: docker build -t calculator .

      - run:
          docker rm -f calculator || true
          docker run -d --name calculator -p 5000:5000 calculator
